name: Build EfiGuard
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Install Assembly Tools (NASM)
        run: |
          choco install nasm
          echo "NASM_PREFIX=C:\Program Files\NASM\" >> $env:GITHUB_ENV

      - name: Checkout EDK2
        run: |
          git clone --recursive https://github.com/tianocore/edk2.git edk2
          
      - name: Checkout EfiGuard with Submodules
        run: |
          cd edk2
          git clone --recursive https://github.com/${{ github.repository }}.git EfiGuardPkg

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Compile EDK2 BaseTools
        run: |
          cd edk2
          cmd /c "edksetup.bat Rebuild"

      - name: Compile EfiGuard DXE Drivers (.efi)
        run: |
          cd edk2
          cmd /c "edksetup.bat && build -a X64 -t VS2022 -p EfiGuardPkg/EfiGuardPkg.dsc -b RELEASE"

      - name: Setup MSBuild for Windows Applications
        uses: microsoft/setup-msbuild@v2

      - name: Compile EfiDSEFix Application (.exe)
        run: |
          # Use MSBuild to explicitly compile the Windows user-mode application targets
          msbuild edk2/EfiGuardPkg/EfiGuard.sln /p:Configuration=Release /p:Platform=x64

      - name: Consolidate Final Output Binaries
        run: |
          # Create a single clean folder to drop all the final working files into
          mkdir dist
          copy edk2\Build\EfiGuard\RELEASE_VS2022\X64\EfiGuardDxe.efi dist\
          copy edk2\Build\EfiGuard\RELEASE_VS2022\X64\Loader.efi dist\
          copy edk2\EfiGuardPkg\x64\Release\EfiDSEFix.exe dist\
          copy edk2\EfiGuardPkg\x64\Release\Loader.exe dist\

      - name: Upload Complete EfiGuard Bundle
        uses: actions/upload-artifact@v4
        with:
          name: EfiGuard-Complete-Pack
          path: dist/
