name: Build EfiGuard
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Install Assembly Tools (NASM)
        run: |
          choco install nasm
          echo "NASM_PREFIX=C:\Program Files\NASM\" >> $env:GITHUB_ENV

      - name: Checkout EDK2
        run: |
          git clone --recursive https://github.com/tianocore/edk2.git edk2
          
      - name: Checkout EfiGuard with Submodules
        run: |
          cd edk2
          git clone --recursive https://github.com/${{ github.repository }}.git EfiGuardPkg

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Compile EDK2 BaseTools
        run: |
          cd edk2
          cmd /c "edksetup.bat Rebuild"

      - name: Compile EfiGuard DXE Drivers (.efi)
        run: |
          cd edk2
          cmd /c "edksetup.bat && build -a X64 -t VS2022 -p EfiGuardPkg/EfiGuardPkg.dsc -b RELEASE"

      - name: Setup MSBuild for Windows Applications
        uses: microsoft/setup-msbuild@v2

      - name: Compile EfiDSEFix Application (.exe)
        run: |
          msbuild edk2/EfiGuardPkg/EfiGuard.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Consolidate Final Output Binaries
        run: |
          mkdir dist
          # Let PowerShell hunt down the files dynamically so we don't have to guess the folder paths!
          Get-ChildItem -Path edk2 -Filter EfiGuardDxe.efi -Recurse | Copy-Item -Destination dist\
          Get-ChildItem -Path edk2 -Filter Loader.efi -Recurse | Copy-Item -Destination dist\
          Get-ChildItem -Path edk2 -Filter EfiDSEFix.exe -Recurse | Copy-Item -Destination dist\

      - name: Upload Complete EfiGuard Bundle
        uses: actions/upload-artifact@v4
        with:
          name: EfiGuard-Complete-Pack
          path: dist/
